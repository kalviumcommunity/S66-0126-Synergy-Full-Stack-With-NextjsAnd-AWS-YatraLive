# ==============================================
# REDIS CONFIGURATION FOR TRAIN TRACKER
# ==============================================

# Bind to all interfaces (for container)
bind 0.0.0.0

# Protected mode off for container networking
protected-mode no

# Port
port 6379

# TCP backlog
tcp-backlog 511

# Timeout
timeout 0

# TCP keepalive
tcp-keepalive 300

# Daemonize no (run in foreground for Docker)
daemonize no

# PID file
pidfile /var/run/redis_6379.pid

# Logging
loglevel notice
logfile ""

# Databases
databases 16

# ------------------------------------------------------------------
# SNAPSHOTTING (Persistence)
# ------------------------------------------------------------------
# Save DB to disk:
save 900 1      # Save if at least 1 key changed in 900 seconds
save 300 10     # Save if at least 10 keys changed in 300 seconds
save 60 10000   # Save if at least 10000 keys changed in 60 seconds

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# ------------------------------------------------------------------
# REPLICATION (for high availability)
# ------------------------------------------------------------------
# replicaof <masterip> <masterport>
# masterauth <master-password>

# ------------------------------------------------------------------
# SECURITY
# ------------------------------------------------------------------
# Requirepass will be set via environment variable
# requirepass yourpassword

# ------------------------------------------------------------------
# LIMITS
# ------------------------------------------------------------------
maxclients 10000
maxmemory 256mb
maxmemory-policy allkeys-lru

# ------------------------------------------------------------------
# APPEND ONLY MODE (AOF)
# ------------------------------------------------------------------
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# ------------------------------------------------------------------
# LUA SCRIPTING
# ------------------------------------------------------------------
lua-time-limit 5000

# ------------------------------------------------------------------
# SLOW LOG
# ------------------------------------------------------------------
slowlog-log-slower-than 10000
slowlog-max-len 128

# ------------------------------------------------------------------
# LATENCY MONITOR
# ------------------------------------------------------------------
latency-monitor-threshold 0

# ------------------------------------------------------------------
# EVENT NOTIFICATION
# ------------------------------------------------------------------
notify-keyspace-events ""

# ------------------------------------------------------------------
# ADVANCED CONFIG
# ------------------------------------------------------------------
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000
stream-node-max-bytes 4096
stream-node-max-entries 100
activerehashing yes
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60
hz 10
dynamic-hz yes
aof-rewrite-incremental-fsync yes
rdb-save-incremental-fsync yes